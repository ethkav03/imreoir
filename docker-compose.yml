services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - PORT=3001

  postgres:
    image: postgres:17
    container_name: imreoir-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: imreoir
      POSTGRES_PASSWORD: imreoirpassword
      POSTGRES_DB: imreoir
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
